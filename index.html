<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>P(我们相遇)</title>
  <style>
    :root {
      color-scheme: light;
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
      color: #252337;
      background: #e9eefb;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 16% 12%, rgba(136, 158, 224, 0.58), transparent 31%),
        radial-gradient(circle at 84% 16%, rgba(168, 139, 219, 0.5), transparent 34%),
        radial-gradient(circle at 50% 78%, rgba(255, 236, 250, 0.34), transparent 36%),
        linear-gradient(155deg, #dfe7fb 0%, #d8e2f7 34%, #eee8fb 68%, #faf5ff 100%);
    }

    .app {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    .start-screen {
      position: absolute;
      inset: 0;
      z-index: 4;
      display: grid;
      place-items: center;
      padding: 28px;
      text-align: center;
      background:
        radial-gradient(circle at 50% 32%, rgba(236, 229, 255, 0.5), transparent 34%),
        linear-gradient(155deg, #dfe7fb 0%, #e8e6fb 46%, #faf5ff 100%);
      transition: opacity 700ms ease, visibility 700ms ease;
    }

    .start-screen.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .start-content {
      width: min(100%, 560px);
    }

    .start-date {
      margin: 0 0 18px;
      color: rgba(67, 62, 112, 0.72);
      font-size: 15px;
      letter-spacing: 0.18em;
    }

    .start-copy {
      margin: 0 auto 28px;
      color: rgba(37, 35, 58, 0.82);
      font-size: clamp(22px, 6vw, 34px);
      line-height: 1.45;
      letter-spacing: 0;
    }

    .start-button {
      min-height: 48px;
      border: 1px solid rgba(255, 255, 255, 0.34);
      border-radius: 999px;
      padding: 0 22px;
      background: rgba(42, 42, 74, 0.28);
      color: rgba(255, 248, 238, 0.96);
      font: inherit;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 12px 38px rgba(38, 35, 31, 0.08);
      backdrop-filter: blur(16px);
    }

    .start-button:disabled {
      cursor: default;
      opacity: 0.72;
    }

    .story-shell {
      opacity: 0;
      visibility: hidden;
      transition: opacity 700ms ease, visibility 700ms ease;
    }

    .story-shell.active {
      opacity: 1;
      visibility: visible;
    }

    .cloud-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 50% 34%, rgba(230, 236, 255, 0.34), transparent 54%),
        radial-gradient(circle at 48% 42%, rgba(189, 205, 246, 0.3), transparent 48%),
        radial-gradient(circle at 62% 28%, rgba(213, 193, 244, 0.3), transparent 42%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100vh;
      touch-action: manipulation;
    }

    .memory-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 1;
    }

    .memory-shard {
      position: absolute;
      width: clamp(116px, 34vw, 220px);
      aspect-ratio: 4 / 5;
      border-radius: 6px;
      background-image: var(--memory-image);
      background-size: cover;
      background-position: center;
      opacity: 0;
      filter: blur(0.8px) saturate(0.65) brightness(1.15) contrast(0.9);
      mix-blend-mode: screen;
      box-shadow: 0 0 46px rgba(230, 236, 255, 0.18);
      transform: translate3d(0, 18px, 0) rotate(var(--memory-rotate, -4deg)) scale(0.94);
      animation: memoryFloat 7.5s ease-in-out infinite;
      mask-image: radial-gradient(ellipse at center, #000 42%, rgba(0, 0, 0, 0.72) 68%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse at center, #000 42%, rgba(0, 0, 0, 0.72) 68%, transparent 100%);
    }

    .memory-shard.visible {
      transform: translate3d(0, 0, 0) rotate(var(--memory-rotate, -4deg)) scale(1);
    }

    .memory-shard.pos-left {
      left: 7%;
      top: 16%;
    }

    .memory-shard.pos-right {
      right: 6%;
      top: 20%;
    }

    .memory-shard.pos-center {
      left: 50%;
      top: 13%;
      transform: translate3d(-50%, 18px, 0) rotate(var(--memory-rotate, 2deg)) scale(0.94);
      animation-name: memoryRevealCenter, memoryFloat;
    }

    .memory-shard.pos-center.visible {
      transform: translate3d(-50%, 0, 0) rotate(var(--memory-rotate, 2deg)) scale(1);
    }

    @keyframes memoryFloat {
      0%,
      100% {
        margin-top: 0;
      }
      50% {
        margin-top: -10px;
      }
    }

    .panel {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 2;
      padding: 8px 4px 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      box-shadow: none;
      backdrop-filter: none;
      text-align: center;
      text-shadow: 0 1px 20px rgba(255, 255, 255, 0.82);
    }

    .step-label {
      margin: 0 0 8px;
      color: rgba(94, 76, 132, 0.58);
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .step-label.start-date {
      color: rgba(67, 62, 112, 0.7);
      font-size: 15px;
      letter-spacing: 0.18em;
    }

    .step-title {
      display: none;
    }

    .step-copy {
      min-height: 72px;
      max-width: 620px;
      margin: 0 auto 20px;
      color: rgba(49, 47, 76, 0.72);
      font-size: 16px;
      line-height: 1.75;
    }

    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 13px;
      max-width: 620px;
      margin: 0 auto;
    }

    .progress {
      display: flex;
      gap: 7px;
      justify-content: center;
    }

    .progress i {
      width: 23px;
      height: 4px;
      border-radius: 999px;
      background: rgba(44, 45, 77, 0.1);
    }

    .progress i.active {
      background: rgba(128, 105, 198, 0.56);
    }

    button {
      min-height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      border-radius: 999px;
      padding: 0 20px;
      background: rgba(42, 42, 74, 0.24);
      color: rgba(255, 248, 238, 0.94);
      font: inherit;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 12px 38px rgba(38, 35, 31, 0.06);
      backdrop-filter: blur(16px);
    }

    button:active {
      transform: translateY(1px);
    }

    @media (max-width: 420px) {
      button {
        width: auto;
        max-width: 100%;
      }
    }

    @media (min-width: 760px) {
      .panel {
        left: 50%;
        right: auto;
        width: min(720px, calc(100% - 56px));
        transform: translateX(-50%);
        padding: 10px 0 0;
      }

      .step-copy {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="start-screen" id="startScreen" aria-label="故事开始">
      <div class="start-content">
        <p class="start-date">2026.06.26</p>
        <p class="start-copy">每一段相遇，<br>都从许多小小的选择开始。</p>
        <button class="start-button" id="startButton" type="button">开始这段故事</button>
      </div>
    </section>

    <div class="story-shell" id="storyShell">
      <section class="cloud-stage" aria-label="概率云互动动画">
        <canvas id="probabilityCloud"></canvas>
        <div class="memory-layer" id="memoryLayer" aria-hidden="true"></div>
      </section>

      <section class="panel">
        <p class="step-label" id="stepLabel">Step 1 / 5</p>
        <h1 class="step-title" id="stepTitle"></h1>
        <p class="step-copy" id="stepCopy">相遇之前，我们都只是无数可能中的一个样本点。</p>
        <div class="controls">
          <div class="progress" id="progress" aria-hidden="true"></div>
          <button id="nextButton" type="button">看看选择如何开始</button>
        </div>
      </section>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("probabilityCloud");
    const ctx = canvas.getContext("2d");
    const startScreen = document.getElementById("startScreen");
    const storyShell = document.getElementById("storyShell");
    const startButton = document.getElementById("startButton");
    const button = document.getElementById("nextButton");
    const stepLabel = document.getElementById("stepLabel");
    const stepTitle = document.getElementById("stepTitle");
    const stepCopy = document.getElementById("stepCopy");
    const progress = document.getElementById("progress");
    const remainingText = document.getElementById("remainingText");
    const memoryLayer = document.getElementById("memoryLayer");
    const photoPath = (step, pos, index = 1) => `photo/step${step}-${pos}-${index}.jpg`;
    const defaultMemorySettings = {
      delayStartMs: 3000,
      delayBetweenMs: 1000,
      peakOpacity: 0.6,
      fadeInMs: 1000,
      holdMs: 5000,
      fadeOutMs: 2000,
      enterY: 18,
      exitY: -12,
      enterScale: 0.94,
      exitScale: 1.04
    };

    const memorySettingsByStep = {
      1: {
        delayStartMs: 6000,
        delayBetweenMs: 1000,
        peakOpacity: 1,
        fadeInMs: 1000,
        holdMs: 5000,
        fadeOutMs: 2000,
        enterY: 18,
        exitY: -12,
        enterScale: 0.94,
        exitScale: 1.04
      },
      2: {
        delayStartMs: 3000,
        delayBetweenMs: 2000,
        peakOpacity: 0.6,
        fadeInMs: 1000,
        holdMs: 5000,
        fadeOutMs: 2000,
        enterY: 18,
        exitY: -12,
        enterScale: 0.94,
        exitScale: 1.04
      },
      3: {
        delayStartMs: 4000,
        delayBetweenMs: 4000,
        peakOpacity: 1,
        fadeInMs: 1000,
        holdMs: 4000,
        fadeOutMs: 500,
        enterY: 18,
        exitY: -12,
        enterScale: 0.94,
        exitScale: 1.04
      },
      4: {
        delayStartMs: 3000,
        delayBetweenMs: 1000,
        peakOpacity: 0.6,
        fadeInMs: 1000,
        holdMs: 5000,
        fadeOutMs: 2000,
        enterY: 18,
        exitY: -12,
        enterScale: 0.94,
        exitScale: 1.04
      },
      5: {
        delayStartMs: 3000,
        delayBetweenMs: 1000,
        peakOpacity: 0.6,
        fadeInMs: 1000,
        holdMs: 5000,
        fadeOutMs: 2000,
        enterY: 18,
        exitY: -12,
        enterScale: 0.94,
        exitScale: 1.04
      }
    };

    const steps = [
      {
        title: "样本空间",
        copy: "相遇之前，我们都只是无数可能中的一个样本点。",
        keep: 1,
        label: "样本空间：很多很多种可能",
        button: "看看选择如何开始",
        memories: [
          { src: photoPath(1, "left"), pos: "left", rotate: "-5deg", opacityScale: 0.95 },
          { src: photoPath(1, "right"), pos: "right", rotate: "6deg", opacityScale: 0.9 }
        ]
      },
      {
        title: "条件出现",
        copy: "每一个选择，都会让一些可能性远去，也让另一些可能性留下。",
        keep: 0.55,
        label: "条件概率：样本空间开始缩小",
        button: "继续靠近那条路径",
        memories: [
          { src: photoPath(2, "left"), pos: "left", rotate: "-7deg", opacityScale: 1.05 },
          { src: photoPath(2, "center"), pos: "center", rotate: "2deg", opacityScale: 1.08 },
          { src: photoPath(2, "right"), pos: "right", rotate: "5deg", opacityScale: 0.93 }
        ]
      },
      {
        title: "路径收缩",
        copy: "一次次了解和回应，让两条独立的轨迹慢慢靠近。",
        keep: 0.22,
        label: "收敛：独立轨迹开始靠近",
        button: "看见那个结果",
        memories: [
          { src: photoPath(3, "left", 1), pos: "left", rotate: "4deg", opacityScale: 0.93 },
          { src: photoPath(3, "center", 1), pos: "center", rotate: "-2deg", opacityScale: 1.13 },
          { src: photoPath(3, "right", 1), pos: "right", rotate: "8deg", opacityScale: 0.9 },
          { src: photoPath(3, "left", 2), pos: "left", rotate: "-6deg", opacityScale: 0.86 },
          { src: photoPath(3, "center", 2), pos: "center", rotate: "3deg", opacityScale: 1.02 },
          { src: photoPath(3, "right", 2), pos: "right", rotate: "-4deg", opacityScale: 0.84 }
        ]
      },
      {
        title: "显著相遇",
        copy: "小概率不代表不会发生；当它真的发生，就成为无法忽略的确定。",
        keep: 0.02,
        label: "结果：一个显著的小概率事件",
        button: "走向共同的未来",
        memories: [
          { src: photoPath(4, "center"), pos: "center", rotate: "1deg", opacityScale: 1.1, delayMs: 450 }
        ],
        mode: "meet"
      },
      {
        title: "共同未来",
        copy: "从今天开始，未来的无限可能，由我们一起探索。",
        keep: 0,
        label: "新的样本空间：共同探索",
        button: "再看一次我们的概率云",
        mode: "future"
      }
    ];

    const palette = ["#ffffff", "#f9fbff", "#dfe9ff", "#d7defa", "#eee3ff", "#f7e9ff", "#e7f5ff"];
    const gold = ["#f7d984", "#f7d984"];
    let width = 0;
    let height = 0;
    let dpr = 1;
    let balls = [];
    let futureBalls = [];
    let meetEchoBalls = [];
    let stepIndex = 0;
    let settleTick = 0;
    let hasStarted = false;
    let isStarting = false;
    let advanceLockedUntil = 0;

    function random(min, max) {
      return min + Math.random() * (max - min);
    }

    function currentMode() {
      return steps[stepIndex].mode || "filter";
    }

    function cloudZoom() {
      const visibleStep = Math.min(stepIndex, 3);
      return 1 + visibleStep * 0.25;
    }

    function cloudCenterY() {
      return height * 0.37;
    }

    function cloudCenterPull() {
      const visibleStep = Math.min(stepIndex, 3);
      return visibleStep * 0.15;
    }

    function makeProgress() {
      progress.innerHTML = "";
      steps.forEach((_, index) => {
        const item = document.createElement("i");
        if (index <= stepIndex) item.classList.add("active");
        progress.appendChild(item);
      });
    }

    function getMemorySettings(stepNumber) {
      return {
        ...defaultMemorySettings,
        ...(memorySettingsByStep[stepNumber] || {})
      };
    }

    function renderMemories(memories = [], settings = defaultMemorySettings) {
      memoryLayer.innerHTML = "";
      memories.forEach((memory, index) => {
        const shard = document.createElement("div");
        shard.className = `memory-shard pos-${memory.pos || "center"}`;
        const isCenter = (memory.pos || "center") === "center";
        const rotate = memory.rotate || (isCenter ? "2deg" : "0deg");
        const peakOpacity = memory.opacity ?? settings.peakOpacity * (memory.opacityScale ?? 1);
        const delay = memory.delayMs ?? settings.delayStartMs + index * settings.delayBetweenMs;
        const duration = settings.fadeInMs + settings.holdMs + settings.fadeOutMs;
        const fadeInPoint = settings.fadeInMs / duration;
        const holdPoint = (settings.fadeInMs + settings.holdMs) / duration;
        const memoryTransform = (y, scale) => {
          const translate = isCenter ? `translate3d(-50%, ${y}px, 0)` : `translate3d(0, ${y}px, 0)`;
          return `${translate} rotate(${rotate}) scale(${scale})`;
        };

        shard.style.setProperty("--memory-image", `url("${memory.src}")`);
        shard.style.setProperty("--memory-rotate", rotate);
        memoryLayer.appendChild(shard);
        shard.animate(
          [
            {
              opacity: 0,
              transform: memoryTransform(settings.enterY, settings.enterScale),
              offset: 0
            },
            {
              opacity: peakOpacity,
              transform: memoryTransform(0, 1),
              offset: fadeInPoint
            },
            {
              opacity: peakOpacity,
              transform: memoryTransform(0, 1),
              offset: holdPoint
            },
            {
              opacity: 0,
              transform: memoryTransform(settings.exitY, settings.exitScale),
              offset: 1
            }
          ],
          {
            delay,
            duration,
            easing: "ease-in-out",
            fill: "both"
          }
        );
      });
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      width = rect.width;
      height = rect.height;
      canvas.width = Math.floor(width * dpr);
      canvas.height = Math.floor(height * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      if (!balls.length) createCloud();
      repositionCloud();
    }

    function createCloud() {
      const count = width < 540 ? 100 : 200;
      balls = [];
      for (let i = 0; i < count; i += 1) {
        const angle = random(0, Math.PI * 2);
        const radius = Math.sqrt(Math.random());
        const cloudX = Math.cos(angle) * radius * width * random(0.2, 0.46);
        const cloudY = Math.sin(angle) * radius * height * random(0.1, 0.22);
        const isGold = i < 2;
        balls.push({
          baseX: width / 2 + cloudX,
          baseY: height * 0.37 + cloudY,
          x: width / 2 + cloudX,
          y: height * 0.37 + cloudY,
          vx: random(-0.8, 0.8),
          vy: random(-0.6, 0.6),
          r: isGold ? random(7, 9) : random(3.6, 8.8),
          color: isGold ? gold[i] : palette[Math.floor(random(0, palette.length))],
          alpha: isGold ? 0.34 : random(0.5, 0.96),
          phase: random(0, Math.PI * 2),
          driftAmpX: random(2.0, 3.2),
          driftAmpY: random(1.5, 2.6),
          driftSpeedX: random(0.0009, 0.0015),
          driftSpeedY: random(0.0009, 0.0016),
          state: isGold ? "gold" : "cloud",
          goldIndex: i,
          fallSpeed: random(1.9, 4.8),
          targetX: 0,
          targetY: 0
        });
      }
    }

    function repositionCloud() {
      balls.forEach((ball) => {
        if (ball.state === "gone") return;
        ball.baseX = Math.max(30, Math.min(width - 30, ball.baseX));
        ball.baseY = Math.max(40, Math.min(height * 0.67, ball.baseY));
      });
    }

    function updateContent() {
      if (!hasStarted) {
        showStartScreen();
        return;
      }
      const step = steps[stepIndex];
      stepLabel.classList.remove("start-date");
      stepLabel.textContent = `Step ${stepIndex + 1} / ${steps.length}`;
      stepTitle.textContent = step.title;
      stepCopy.textContent = step.copy;
      if (remainingText) remainingText.textContent = step.label;
      button.textContent = step.button;
      renderMemories(step.memories, getMemorySettings(stepIndex + 1));
      makeProgress();
    }

    function showStartScreen() {
      isStarting = false;
      startScreen.classList.remove("hidden");
      storyShell.classList.remove("active");
      startButton.disabled = false;
      startButton.textContent = "开始这段故事";
      stepLabel.classList.remove("start-date");
      stepLabel.textContent = "Step 1 / 5";
      stepTitle.textContent = steps[0].title;
      stepCopy.textContent = steps[0].copy;
      button.textContent = steps[0].button;
      progress.innerHTML = "";
      renderMemories([]);
    }

    function startStory() {
      if (isStarting || hasStarted) return;
      isStarting = true;
      startButton.disabled = true;
      startButton.textContent = "故事即将开始";
      advanceLockedUntil = performance.now() + 1400;
      hasStarted = true;
      stepIndex = 0;
      window.setTimeout(() => {
        startScreen.classList.add("hidden");
        storyShell.classList.add("active");
        updateContent();
        refreshRemainingCloudMotion();
        isStarting = false;
      }, 220);
    }

    function dropToKeepRatio(keepRatio) {
      const ordinary = balls.filter((ball) => ball.state === "cloud");
      const totalOrdinary = balls.filter((ball) => ball.state !== "gold").length;
      const shouldRemain = Math.max(0, Math.floor(totalOrdinary * keepRatio));
      const currentRemain = ordinary.length;
      const dropCount = Math.max(0, currentRemain - shouldRemain);
      const shuffled = ordinary.sort(() => Math.random() - 0.5);

      shuffled.slice(0, dropCount).forEach((ball) => {
        ball.state = "falling";
        ball.vx = random(-0.55, 0.55);
        ball.vy = random(0.6, 1.8);
        ball.alpha = Math.max(ball.alpha, 0.7);
      });

      if (currentMode() === "meet") {
        balls.forEach((ball) => {
          if (ball.state === "cloud") {
            ball.state = "falling";
            ball.vx = random(-0.45, 0.45);
            ball.vy = random(0.8, 1.7);
          }
        });
        settleTick = 0;
      }
    }

    function refreshRemainingCloudMotion() {
      balls.forEach((ball) => {
        if (ball.state !== "cloud") return;
        ball.phase = random(0, Math.PI * 2);
        ball.vx = random(-0.32, 0.32);
        ball.vy = random(-0.22, 0.22);
        ball.driftAmpX = random(2.0, 3.2);
        ball.driftAmpY = random(1.5, 2.6);
        ball.driftSpeedX = random(0.0009, 0.0015);
        ball.driftSpeedY = random(0.0009, 0.0016);
      });
    }

    function resetExperience() {
      stepIndex = 0;
      hasStarted = false;
      balls = [];
      futureBalls = [];
      meetEchoBalls = [];
      createCloud();
      updateContent();
    }

    function createFutureBall(z = random(0.02, 1)) {
      const angle = random(0, Math.PI * 2);
      const radius = random(0.28, 1);
      return {
        angle,
        orbit: radius,
        spreadX: random(0.18, 0.66),
        spreadY: random(0.1, 0.46),
        z,
        speed: random(0.0028, 0.008),
        r: random(3.2, 8.8),
        color: palette[Math.floor(random(0, palette.length))],
        phase: random(0, Math.PI * 2),
        alpha: random(0.36, 0.88)
      };
    }

    function createMeetEchoBall() {
      const angle = random(0, Math.PI * 2);
      const radius = Math.sqrt(Math.random());
      const cloudX = Math.cos(angle) * radius * width * random(0.2, 0.52);
      const cloudY = Math.sin(angle) * radius * height * random(0.1, 0.26);
      return {
        baseX: width / 2 + cloudX,
        baseY: cloudCenterY() + cloudY,
        r: random(2.8, 7.4),
        color: palette[Math.floor(random(0, palette.length))],
        alpha: random(0.24, 0.62),
        phase: random(0, Math.PI * 2)
      };
    }

    function enterMeetScene() {
      meetEchoBalls = [];
      const count = width < 540 ? 170 : 280;
      for (let i = 0; i < count; i += 1) {
        meetEchoBalls.push(createMeetEchoBall());
      }
    }

    function enterFutureCloud() {
      futureBalls = [];
      meetEchoBalls = [];
      const count = width < 540 ? 180 : 300;
      for (let i = 0; i < count; i += 1) {
        futureBalls.push(createFutureBall(random(0.02, 0.18) + (i / count) * 0.08));
      }
      settleTick = 0;
    }

    function advance() {
      if (!hasStarted) {
        return;
      }
      if (performance.now() < advanceLockedUntil) return;
      if (currentMode() === "future") {
        resetExperience();
        return;
      }
      stepIndex += 1;
      updateContent();
      dropToKeepRatio(steps[stepIndex].keep);
      refreshRemainingCloudMotion();
      if (currentMode() === "meet") {
        enterMeetScene();
      }
      if (currentMode() === "future") {
        enterFutureCloud();
      }
    }

    function drawBackground() {
      ctx.clearRect(0, 0, width, height);

      const gradient = ctx.createLinearGradient(0, 0, 0, height);
      gradient.addColorStop(0, "rgba(188, 202, 242, 0.48)");
      gradient.addColorStop(0.38, "rgba(202, 214, 247, 0.36)");
      gradient.addColorStop(0.72, "rgba(240, 229, 255, 0.28)");
      gradient.addColorStop(1, "rgba(248, 242, 255, 0.34)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, width, height);

      const glow = ctx.createRadialGradient(width / 2, height * 0.34, 10, width / 2, height * 0.34, width * 0.74);
      glow.addColorStop(0, "rgba(238, 242, 255, 0.38)");
      glow.addColorStop(0.38, "rgba(198, 213, 249, 0.24)");
      glow.addColorStop(0.62, "rgba(226, 210, 250, 0.18)");
      glow.addColorStop(1, "rgba(255, 255, 255, 0)");
      ctx.fillStyle = glow;
      ctx.fillRect(0, 0, width, height);

      const sideGlow = ctx.createRadialGradient(width * 0.8, height * 0.22, 5, width * 0.8, height * 0.22, width * 0.5);
      sideGlow.addColorStop(0, "rgba(166, 145, 226, 0.3)");
      sideGlow.addColorStop(1, "rgba(194, 176, 244, 0)");
      ctx.fillStyle = sideGlow;
      ctx.fillRect(0, 0, width, height);

      const lower = ctx.createRadialGradient(width * 0.5, height * 0.86, 5, width * 0.5, height * 0.86, width * 0.75);
      lower.addColorStop(0, "rgba(255, 248, 255, 0.34)");
      lower.addColorStop(1, "rgba(255, 248, 255, 0)");
      ctx.fillStyle = lower;
      ctx.fillRect(0, 0, width, height);
    }

    function updateGold(ball) {
      const mode = currentMode();
      const meet = mode === "meet";
      const future = mode === "future";
      const side = ball.goldIndex === 0 ? -1 : 1;
      const spacing = future ? 11 : meet ? 24 : width * 0.18;
      const floatX = future ? Math.sin(settleTick * 0.026 + ball.phase + ball.goldIndex) * 12 : 0;
      const floatY = future ? Math.cos(settleTick * 0.021 + ball.phase * 0.7) * 8 : 0;
      const targetX = width / 2 + side * spacing + floatX;
      const targetY = (future ? height * 0.33 : meet ? height * 0.37 : ball.baseY) + floatY;
      const speed = future ? 0.052 : meet ? 0.035 : 0.008;
      const targetAlpha = future ? 0.9 : meet ? 1 : Math.min(0.95, 0.34 + stepIndex * 0.12);
      const futurePulse = future ? Math.sin(settleTick * 0.045 + ball.phase + ball.goldIndex * 1.7) * 2.4 : 0;
      const targetRadius = future ? 17 + futurePulse : meet ? 17 : 9 + stepIndex * 1.05;

      ball.x += (targetX - ball.x) * speed;
      ball.y += (targetY - ball.y) * speed;
      ball.alpha += (targetAlpha - ball.alpha) * 0.04;
      ball.r += (targetRadius - ball.r) * 0.04;
    }

    function updateBall(ball, time) {
      if (ball.state === "cloud") {
        const zoom = cloudZoom();
        const pull = cloudCenterPull();
        const zoomedBaseX = width / 2 + (ball.baseX - width / 2) * zoom * (1 - pull);
        const zoomedBaseY = cloudCenterY() + (ball.baseY - cloudCenterY()) * zoom * (1 - pull);
        const driftX = Math.sin(time * ball.driftSpeedX + ball.phase) * ball.driftAmpX;
        const driftY = Math.cos(time * ball.driftSpeedY + ball.phase) * ball.driftAmpY;
        ball.x += (zoomedBaseX + driftX - ball.x) * 0.018 + ball.vx;
        ball.y += (zoomedBaseY + driftY - ball.y) * 0.018 + ball.vy;
        ball.vx *= 1;
        ball.vy *= 1;
      }

      if (ball.state === "falling") {
        ball.vy += 0.035;
        ball.x += ball.vx;
        ball.y += ball.vy + ball.fallSpeed * 0.12;
        ball.alpha *= 0.992;
        if (ball.y > height + 30 || ball.alpha < 0.05) {
          ball.state = "gone";
        }
      }

      if (ball.state === "gold") {
        updateGold(ball);
      }
    }

    function updateFutureBall(ball, time) {
      const ramp = Math.min(1, settleTick / 120);
      ball.z += ball.speed * (0.22 + ramp * 0.78);
      const point = futurePosition(ball, time);
      const outsideEdge = point.x < -point.r || point.x > width + point.r || point.y < -point.r || point.y > height + point.r;
      if ((ball.z > 0.88 && outsideEdge) || ball.z > 1.42) {
        Object.assign(ball, createFutureBall(0.02));
      }
      ball.angle += Math.sin(time * 0.0004 + ball.phase) * 0.0008;
    }

    function futurePosition(ball, time = performance.now()) {
      const depth = Math.max(0.02, ball.z);
      const edgePush = Math.pow(depth, 2.35);
      const perspective = 0.12 + edgePush * 6.15;
      const wobble = Math.sin(time * 0.0007 + ball.phase) * 0.035;
      const x = width / 2 + Math.cos(ball.angle + wobble) * ball.orbit * width * ball.spreadX * perspective;
      const y = height * 0.4 + Math.sin(ball.angle - wobble) * ball.orbit * height * ball.spreadY * perspective;
      const r = ball.r * (0.26 + edgePush * 4.8);
      const alpha = Math.min(0.96, ball.alpha * (0.18 + depth * 1.05));
      return { x, y, r, alpha, depth };
    }

    function drawFutureBall(ball) {
      const point = futurePosition(ball);
      ctx.save();
      ctx.globalAlpha = point.alpha;
      ctx.shadowBlur = 16 + point.depth * 26;
      ctx.shadowColor = "rgba(142, 151, 218, 0.34)";
      const radial = ctx.createRadialGradient(point.x - point.r * 0.36, point.y - point.r * 0.36, 1, point.x, point.y, point.r * 1.8);
      radial.addColorStop(0, "#ffffff");
      radial.addColorStop(0.48, ball.color);
      radial.addColorStop(1, "rgba(111, 122, 176, 0.28)");
      ctx.fillStyle = radial;
      ctx.beginPath();
      ctx.arc(point.x, point.y, point.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawMeetEchoCloud(time) {
      if (currentMode() !== "meet" || !meetEchoBalls.length) return;
      const reveal = Math.max(0, Math.min(1, (settleTick - 80) / 140));
      if (reveal <= 0) return;
      const scale = 0.18 + reveal * 1.04;

      meetEchoBalls.forEach((ball) => {
        const driftX = Math.sin(time * 0.0008 + ball.phase) * 1.8;
        const driftY = Math.cos(time * 0.0007 + ball.phase) * 1.3;
        const x = width / 2 + (ball.baseX - width / 2) * scale + driftX;
        const y = cloudCenterY() + (ball.baseY - cloudCenterY()) * scale + driftY;
        const r = ball.r * (0.28 + reveal * 0.52);

        ctx.save();
        ctx.globalAlpha = ball.alpha * reveal * 0.62;
        ctx.shadowBlur = 12;
        ctx.shadowColor = "rgba(142, 151, 218, 0.2)";
        const radial = ctx.createRadialGradient(x - r * 0.35, y - r * 0.35, 1, x, y, r * 1.7);
        radial.addColorStop(0, "#ffffff");
        radial.addColorStop(0.55, ball.color);
        radial.addColorStop(1, "rgba(111, 122, 176, 0.22)");
        ctx.fillStyle = radial;
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function drawBall(ball) {
      if (ball.state === "gone") return;
      const radius = ball.state === "cloud" ? ball.r * (1 + (cloudZoom() - 1) * 0.55) : ball.r;

      ctx.save();
      ctx.globalAlpha = ball.alpha;
      if (ball.state === "gold") {
        ctx.shadowBlur = currentMode() === "meet" || currentMode() === "future" ? 26 : 14;
        ctx.shadowColor = "rgba(246, 207, 115, 0.92)";
      } else {
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(112, 126, 184, 0.24)";
      }

      const radial = ctx.createRadialGradient(ball.x - radius * 0.35, ball.y - radius * 0.35, 1, ball.x, ball.y, radius * 1.6);
      if (ball.state === "gold") {
        radial.addColorStop(0, "#fff8d7");
        radial.addColorStop(0.62, ball.color);
        radial.addColorStop(1, "#c89d43");
      } else {
        radial.addColorStop(0, "#ffffff");
        radial.addColorStop(0.52, ball.color);
        radial.addColorStop(1, "rgba(111, 122, 176, 0.42)");
      }
      ctx.fillStyle = radial;
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawGoldConnection() {
      return;
    }

    function animate(time) {
      drawBackground();
      drawMeetEchoCloud(time);
      if (currentMode() === "future") {
        futureBalls.forEach((ball) => updateFutureBall(ball, time));
        futureBalls
          .slice()
          .sort((a, b) => a.z - b.z)
          .forEach(drawFutureBall);
      }
      balls.forEach((ball) => updateBall(ball, time));
      balls.forEach(drawBall);
      drawGoldConnection();
      if (currentMode() === "meet" || currentMode() === "future") settleTick += 1;
      requestAnimationFrame(animate);
    }

    startButton.addEventListener("click", startStory);
    button.addEventListener("click", advance);
    canvas.addEventListener("click", () => {
      if (hasStarted) advance();
    });
    window.addEventListener("resize", resizeCanvas);

    updateContent();
    resizeCanvas();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
